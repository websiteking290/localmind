version: '3.8'
services:
  localmind-portal:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret-here}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - COINBASE_API_KEY=${COINBASE_API_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
    volumes:
      - ./data:/data
    restart: unless-stopped
